<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piskok Caramel - Sweet Tree</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="Style.CSS" />
</head>
<body>

  <!-- ── BACKGROUND ── -->
  <!-- ✏️ Untuk mengganti foto background, edit di script.js bagian CONFIG -->
  <div class="bg" id="bgLayer"></div>

  <!-- ── CARD UTAMA ── -->
  <div class="card">

    <!-- LOGO & NAMA TOKO -->
    <div class="logo-wrap">
      <!-- ✏️ Untuk mengganti logo, edit di script.js bagian CONFIG -->
      <div class="logo-img" id="logoImg">
        <span class="logo-img-fallback"></span>
      </div>
      <h1 class="store-name" id="storeName">PiscokCaramelTweentyThree</h1>
      <!-- <p class="store-handle" id="storeHandle">@piscokcarameltweentytree</p> -->
    </div>

    <!-- DIVIDER -->
    <div class="divider"></div>

    <!-- TOMBOL LINK -->
    <div class="btn-group">

      <!-- Tombol Website -->
      <a href="#" class="btn btn-website" id="btnWebsite">
        <span class="btn-icon">
          <img src="img/ikon-piscok.png" alt="Website Icon" />
        </span>
        Website
      </a>

      <!-- Tombol ShopeeFood -->
      <a href="#" class="btn btn-shopee" id="btnShopee">
        <span class="btn-icon">
          <img src="img/ikon-shoppe.png" alt="ShopeeFood Icon" />
        </span>
        ShopeeFood
      </a>

      <!-- Tombol Gojek -->
      <a href="#" class="btn btn-gojek" id="btnGojek">
        <span class="btn-icon">
          <img src="img/ikon-gojek.png" alt="Gojek Icon" />
        </span>
        Gojek
      </a>

    </div>
  </div>

  <!-- Script -->
  <script src="Script.js"></script>
</body>
</html>
